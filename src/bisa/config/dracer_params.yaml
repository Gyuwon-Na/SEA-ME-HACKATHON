roi:
  near_y0: 0.70                              # 차선 샘플링 근거리 밴드 상단 y비율
  mid_y0: 0.52                               # 중거리 밴드 상단 y비율
  mid_y1: 0.75                               # 중거리 밴드 하단 y비율
  far_y0: 0.32                               # 원거리 밴드 상단 y비율
  far_y1: 0.58                               # 원거리 밴드 하단 y비율
  detector_light: [0.20, 0.00, 0.80, 0.55]  # 신호등 검출 허용 ROI(x0,y0,x1,y1 비율) — 상단 중앙만
  detector_sign: [0.10, 0.05, 0.90, 0.70]   # 표지판 검출 허용 ROI(비율) — 이 밖 검출은 버림

# Lane-only ROI. Camera stays full size for light/sign/aruco detection; only the
# lane pipeline is cropped to this box. width/height are slider-adjustable live.
# x_offset < 0 => centered horizontally, y_offset < 0 => anchored to frame bottom.
lane_roi:
  enabled: true    # 차선 파이프라인 전용 ROI 크롭 사용 여부
  width: 329       # ROI 가로 px (라이브 조정)
  height: 148      # ROI 세로 px (작게 유지해 연산 절감)
  x_offset: -1     # <0 이면 가로 중앙 정렬
  y_offset: -1     # <0 이면 프레임 하단에 붙임(차선이 보이는 영역)

lane:
  # LAB 도로 마스크: CLAHE 적용된 LAB 이미지에 아래 min/max 임계값으로 inRange
  # 이진화. "Lane ROI Mask" 창을 보면서 튜닝.
  # OpenCV 8bit LAB: L 0..255, a/b 0..255 (128 = 무채색).
  lab_l_min: 20                # L 하한 — 검은 노면의 어두운 부분 유지
  lab_l_max: 205               # L 상한 — 노면 반사는 유지하고 흰 차선은 제외
  lab_a_min: 112               # a 하한 — 무채색 노면 범위
  lab_a_max: 145               # a 상한 — 붉은/주황 물체 제외
  lab_b_min: 122               # b 하한 — 파란 바닥 제외
  lab_b_max: 148               # b 상한 — 노란/주황 물체 제외
  # 흰색/노란색은 반드시 별도 마스크로 유지한다. OUT은 white만 사용하고,
  # IN은 추후 점선 기반 진입/탈출을 위해 white|yellow를 사용한다.
  white_l_min: 200             # 밝은 흰색 페인트
  white_l_max: 255
  white_a_min: 115             # 무채색 128 주변
  white_a_max: 140
  white_b_min: 115
  white_b_max: 145
  yellow_l_min: 80             # 그림자진 노란 페인트도 유지
  yellow_l_max: 255
  yellow_a_min: 100
  yellow_a_max: 140
  yellow_b_min: 165            # 노란색 핵심: 높은 b, 피부/노면 제외
  yellow_b_max: 255
  out_white_only: true         # OUT에서는 노란 IN 분기선을 조향 피팅에서 완전히 제외
  fork_target_y0: 0.05         # 갈림길 형상 관측용 ROI 시작(조향 목표에는 사용하지 않음)
  fork_target_y1: 0.45         # 갈림길 형상 관측용 ROI 끝
  fork_target_min_area_ratio: 0.002 # 형상 관측에서 제거할 작은 흰색 노이즈
  lab_clahe_clip: 2.0          # 이진화/캐니 전 L채널 CLAHE 대비제한
  lab_clahe_tile: 8            # CLAHE 타일 그리드 크기
  morph_open_kernel: 3         # 열림 커널 — 작은 잡티 제거
  morph_close_kernel: 5        # 닫힘 커널 — 끊긴 차선 메움
  min_component_area_ratio: 0.006  # 이 면적비 미만 연결요소는 버림(노이즈 컷)
  fork_area_ratio: 0.035       # 갈림길로 인정할 최소 분기 영역 면적비
  hough_roi_top_ratio: 0.45    # 곡선의 좌우 차선을 함께 포함하도록 탐색 범위 확장
  hough_canny_low: 50          # 캐니 엣지 하한 임계
  hough_canny_high: 150        # 캐니 엣지 상한 임계
  hough_threshold: 38          # was 45: 커브의 짧은 세그먼트도 라인으로 채택 (표 낮춤)
  hough_min_line_length: 30    # was 45: 급커브에서 조각난 짧은 선분도 살림
  hough_max_line_gap: 290      # 선분 사이 이 간격(px) 이하면 하나로 연결
  hough_slope_min_abs: 0.22    # was 0.40: 커브에서 수평에 가까워진 차선이 버려지는 문제 해결(핵심)
  # 직선에서는 위의 top=0.45(하단 55%)를 쓰고, 곡률이 커지면 top=0.62
  # (하단 38%)까지 짧게 피팅한다. 38%보다 작아지지 않아 급커브에서도 점 수를 확보한다.
  hough_curve_top_ratio: 0.62
  hough_curvature_smoothing: 0.25  # 곡률/피팅 길이 프레임간 EMA 계수
  assumed_lane_width_ratio: 0.62   # 추적 이력 없는 최초 단일 차선의 안전 fallback
  lane_width_min_ratio: 0.10       # 양차선 관측 차폭 학습 허용 하한(ROI 폭 대비)
  lane_width_max_ratio: 0.70       # 양차선 관측 차폭 학습 허용 상한
  lane_width_smoothing: 0.20       # 원근 차폭 EMA(양쪽 보일 때만 갱신)
  single_lane_switch_margin_ratio: 0.08  # ID 반전 전 필요한 점수 우위(히스테리시스)
  max_center_jump: 0.35            # ID 필터 뒤 남는 비정상 중심 점프의 최종 안전망

detector:
  model_path: checkpoints/best.pt  # YOLO 가중치 경로(패키지 상대)
  enabled: true                    # 검출기 사용 여부
  # imgsz는 추론 입력 해상도. 클수록 멀리 있는 작은 신호등을 미리 감지(PC라 여유
  # 있음). 480→640으로 더 올리면 더 멀리 보지만 느려짐. GUI에서 라이브 조정 가능.
  imgsz: 640           # 추론 입력 해상도(px) — 차량 CPU는 onboard.launch에서 320으로 낮춤
  # GPU(RTX 4060)에서 imgsz 640 추론이 ~13ms(≈79Hz 여유) → 30Hz로 상향.
  # 아래 투표/연속 카운트는 30Hz 기준으로 스케일됨(프레임 수 = 시간 기준 유지).
  inference_hz: 30.0   # 추론 주기 상한(Hz) — 차량 CPU는 launch에서 4.0으로 낮춤
  ncnn_threads: 2      # 차량 NCNN CPU 스레드(나머지 코어는 카메라/차선/ROS에 예약)
  warmup_enabled: true # 시작 전에 NCNN/Vulkan 커널을 백그라운드에서 사전 생성
  # auto = CUDA GPU on the PC when available, else CPU. Force with cpu / cuda.
  device: cpu          # TOPST 검증 기본값; PowerVR Vulkan은 bbox 좌표 오류로 실험 시에만 명시 사용
  # class_map은 fallback 전용 — 실제 클래스 이름은 모델 메타데이터에서 읽음.
  # 배포 모델: 0=left_sign, 1=right_sign, 2=red_light, 3=green_light
  class_map:
    sign_left: 0       # (fallback) 좌회전 표지 인덱스
    sign_right: 1      # (fallback) 우회전 표지 인덱스
    traffic_red: 2     # (fallback) red 클래스 인덱스
    traffic_green: 3   # (fallback) green 클래스 인덱스
  # 신호등 conf를 낮추면 멀리/작게 잡히는 불도 미리 감지. 행 분할 재분류(row_*)
  # + 상태 게이팅 + 연속 투표가 오탐을 걸러주므로 낮춰도 비교적 안전.
  conf:
    traffic_green: 0.40  # green 검출 최소 신뢰도
    traffic_red: 0.40    # red 검출 최소 신뢰도
    sign_left: 0.65      # 좌 표지 최소 신뢰도
    sign_right: 0.65     # 우 표지 최소 신뢰도
  sign_vote_k: 9         # 최근 n프레임 중 k회 이상 잡히면 표지 방향 확정
  sign_vote_n: 15        # 표지 투표 창(프레임 수)
  # 신호등: classify_light verdict(튜너가 보여주는 값)로 green이면 출발/red면 정지.
  # 제어틱이 아니라 고유한 YOLO 추론 프레임으로만 계수한다.
  light_confirm_frames: 3  # 신호색이 서로 다른 추론 프레임에서 연속 확인될 때 동작
  light_stale_sec: 0.75    # 이 시간보다 오래된 신호 판정은 자동 해제

throttle:
  # 정지 명령(0.0)을 제외한 모든 이동 명령은 [speed_min, speed_max] 안에 있다.
  # 직선 deadband 안에서는 speed_max, 조향/곡률이 커지면 speed_min 쪽으로 감속한다.
  speed_min: 0.20          # 이동 속도밴드 하한(정지 아닌 최저속)
  speed_max: 0.25          # 직선 목표 최고속
  launch_cap: 0.22         # 호환용(OUT은 초록~표지판까지 speed_max+곡률 스케줄 사용)
  s_curve_cap: 0.22        # IN 진입/랩 골격용 속도 상한
  fork_approach_cap: 0.22  # 표지판 확정 직후 방향별 선제 강제 조향 속도 상한
  fork_commit_cap: 0.22    # 갈림길 방향 강제 조향은 가장 낮은 별도 상한 사용
  post_fork_cap: 0.25      # 갈림길 이후 일반 차선의 직선에서만 전역 최고속 허용
  post_fork_min: 0.20      # 전 구간에서 동일한 전역 최저속까지 감속 허용
  ramp_up_per_cmd: 0.005   # 20Hz에서 틱당 가속량(감속은 즉시 반영)
  steer_slowdown: 0.05     # 조향 클수록 감속하는 계수
  curvature_slowdown: 0.025 # 곡률 클수록 감속하는 계수
  straight_steer_deadband: 0.06     # 이 이하 조향 노이즈는 직선으로 간주
  straight_curvature_deadband: 0.06 # 이 이하 곡률 노이즈는 직선으로 간주

# Pure pursuit steering. center_error(정규화 오차)가 lateral_scale_m 미터의
# 횡방향 오프셋으로 변환되고, lookahead_m 앞의 목표점을 향한 자전거 모델 조향각
# atan2(2*wheelbase*sin(alpha), Ld) 을 max_steer_deg로 나눠 [-1,1] 명령으로 정규화.
# curve_blend 는 도로 굽어짐(signed curvature)만큼 목표점을 이동시킴.
steering:
  steer_sign: 1              # 조향 부호(좌우 반대로 나가면 -1)
  lookahead_m: 0.62          # 직선 순수추종 전방주시 거리(m)
  curve_lookahead_min_m: 0.38 # 최대 곡률에서의 최소 전방주시(짧은 맵 코너용)
  curve_response_power: 0.80  # 1보다 작아 커브 진입부터 반응하되 sqrt보다 완만
  curve_steer_boost: 0.15     # 커브에서만 곡률 비례 조향 증폭(직선=0% 증폭)
  fork_curve_scale: 0.25      # 갈림길 ROI가 만든 가짜 곡률/상쇄 영향을 25%로 제한
  fork_forced_error: 0.3    # LEFT(+)/RIGHT(-)에 동일 크기로 적용하는 방향 목표
  wheelbase_m: 0.17          # 실차 전·후차축 거리(자전거 모델, m)
  lateral_scale_m: 0.30      # 오차 1.0을 몇 m 횡오프셋으로 볼지
  max_steer_deg: 35.0        # 조향각 정규화 기준(풀락 각도)
  pp_gain: 1.0               # 순수추종 조향 게인
  curve_blend: 1.0           # 곡률로 목표점 이동시키는 정도
  rate_limit_per_cmd: 0.12   # 20Hz에서 S 출구 방향 전환을 따라가도록 틱당 응답량 확보
  straight_limit: 0.60       # 출발 직후 완만한 상단 커브 허용
  s_curve_limit: 0.95        # 원형교차로/S자 최대 조향(1.0 풀락은 여유로 보존)
  fork_approach_limit: 0.35  # 표지판 방향 펄스는 풀 조향의 35% 이내로 제한
  fork_limit: 0.55           # 펄스 후 양차선 중앙 정렬 조향 클램프
  post_fork_limit: 0.90      # 우측 연속 S자/헤어핀용
  lost_decay: 0.85           # 곡선 차선을 한 프레임 놓쳐도 조향을 급히 풀지 않음

aruco:
  enabled: true              # ArUco 마커 검출 사용 여부
  dictionary: DICT_6X6_50    # ArUco 사전
  target_id: 3               # OUT_TO_ARUCO에서 이 ID가 확인되면 정지
  confirm_frames: 2          # 연속 확인 프레임 수(단발 오검출 방지)
  clear_frames: 3            # 연속 미검출 프레임 수(깜빡임 재출발 방지)
  detect_hz: 20.0            # 마커 검출 주기(Hz) — 온보드 루프와 통일

# YOLO 검출 프레임 전처리(CLAHE→채도부스트→밝기/대비/감마). 레퍼런스처럼
# 검출 전에 적용해 색을 또렷하게. enabled=true면 검출기·색분류가 보정본을 봄.
color_correction:
  enabled: true          # true면 검출기·색분류가 보정본 프레임을 봄
  clahe_clip: 2.0        # CLAHE 대비제한
  clahe_tile: 8          # CLAHE 타일 크기
  saturation_boost: 1.5  # 채도 부스트 배율(HSV S)
  brightness: 0          # 밝기 가산값(-50..50)
  contrast: 1.0          # 대비 배율(0..3)
  saturation: 1.0        # 채도 배율(0..3)
  gamma: 1.0             # 감마 보정(0.1..3)

# YOLO가 검출한 신호등 박스의 red/green 색 판별. 박스를 세로 3등분해서
# 윗칸(red)/아랫칸(green)만 점수내고 높은 쪽이 이김. 가운데(amber)는 무시
# (미션은 red/green만, 대회 신호등은 가운데 불을 테이프로 가림).
traffic_light:
  red_h1_hi: 10        # red 저역 hue 상한 [0..this]
  red_h2_lo: 170       # red 고역 hue 하한 [this..180]
  red_s_min: 120       # red 최소 채도
  red_v_min: 100       # red 최소 명도
  green_h_lo: 40       # green hue 하한
  green_h_hi: 90       # green hue 상한
  green_s_min: 50      # green 최소 채도
  green_v_min: 50      # green 최소 명도
  # 이긴 칸의 매칭(color)/점등(lit) 픽셀 비율이 이 값 이상이어야 인정, 아니면 drop.
  row_min_ratio: 0.02  # 이긴 칸 픽셀비 임계(이하면 판정 무효)
  # lit 분류기 전용: 점등 픽셀 = V>=row_lit_v_min AND 색마스크, 또는 그 밝은 색
  # 링 근처의 백열 픽셀(S<=row_white_s_max). color/lab 분류기에선 미사용.
  row_lit_v_min: 220   # (lit 전용) 점등으로 볼 최소 명도 V
  row_white_s_max: 80  # (lit 전용) 백열 코어로 볼 최대 채도 S
  # lab 분류기 전용: OpenCV 8bit LAB은 초록↔빨강 a채널 중심이 128.
  # a>=lab_a_red_min=빨강, a<=lab_a_green_max=초록, L>=lab_l_min 픽셀만 카운트.
  lab_a_red_min: 150   # (lab 전용) a>=이 값이면 red
  lab_a_green_max: 110 # (lab 전용) a<=이 값이면 green
  lab_l_min: 69        # (lab 전용) L>=이 값 픽셀만 카운트(어두운 배경 제외)
  # 주행 파이프라인이 쓸 분류기:
  #   color = 레퍼런스 순수 색비율(HSV, 밝기 무시). 기본값. 대회 신호등은 안 쓰는
  #           불을 검은 테이프로 가려서 색이 있는 건 켜진 램프뿐 → 꺼진 렌즈에
  #           속을 일이 없음. 엄격한 밝기 게이트가 없어 흐린/역광 램프도 덜 놓침.
  #           야외 검증됨.
  #   lit   = 발광 게이팅(HSV V>=row_lit_v_min + 백열코어). 테이프 없이 꺼진
  #           렌즈가 색을 유지할 때만 필요. V>=220 게이트가 흐린 램프를 놓칠 수 있음.
  #   lab   = LAB a채널(빨강=a큼, 초록=a작음). hue 랩어라운드 없고 조명 변화에
  #           더 안정적, HSV green 범위가 놓치는 청록 초록불도 잡음. 현장 A/B용.
  classifier: lab      # 사용할 색분류기: color / lit / lab

mission:
  route_mode: OUT               # 코스 모드(OUT/IN/LANE), 각 FSM은 완전히 분리
  control_hz: 20.0              # 제어 루프 주기(Hz)
  # OUT은 초록불 뒤 별도 ENTRY/S 상태 없이 흰 차선을 곡률 기반 추종하다가
  # 표지판 투표가 확정될 때만 fork 접근 상태로 넘어간다.
  # 표지판 방향은 아주 짧게만 넣고, 곧바로 양쪽 흰 차선을 재검출해 중앙 정렬한다.
  fork_sign_advance_sec: 0.4    # 방향별 약한 조향 펄스 유지 시간(s)
  fork_commit_min_sec: 0.3      # 양차선 중앙 정렬을 유지할 최소 시간(s)
  fork_commit_timeout_sec: 3.0  # 중앙 섬 통과/선택 코스 재정렬의 최종 안전 타임아웃
  debug_log_hz: 1.0             # 상태 로그 출력 주기(Hz)

roi:
  near_y0: 0.70
  mid_y0: 0.52
  mid_y1: 0.75
  far_y0: 0.32
  far_y1: 0.58
  detector_light: [0.20, 0.00, 0.80, 0.55]
  detector_sign: [0.10, 0.05, 0.90, 0.70]
  detector_dynamic: [0.00, 0.35, 1.00, 1.00]

# Lane-only ROI. Camera stays full size for light/sign/aruco detection; only the
# lane pipeline is cropped to this box. width/height are slider-adjustable live.
# x_offset < 0 => centered horizontally, y_offset < 0 => anchored to frame bottom.
lane_roi:
  enabled: true
  width: 640
  height: 240
  x_offset: -1
  y_offset: -1

lane:
  # LAB 도로 마스크: CLAHE 적용된 LAB 이미지에 아래 min/max 임계값으로 inRange
  # 이진화. "Lane ROI Mask" 창을 보면서 튜닝.
  # OpenCV 8bit LAB: L 0..255, a/b 0..255 (128 = 무채색).
  lab_l_min: 0
  lab_l_max: 90
  lab_a_min: 105
  lab_a_max: 150
  lab_b_min: 105
  lab_b_max: 150
  lab_clahe_clip: 2.0
  lab_clahe_tile: 8
  morph_open_kernel: 3
  morph_close_kernel: 5
  min_component_area_ratio: 0.006
  fork_area_ratio: 0.035
  hough_roi_top_ratio: 0.58
  hough_canny_low: 50
  hough_canny_high: 150
  hough_threshold: 38          # was 45: 커브의 짧은 세그먼트도 라인으로 채택 (표 낮춤)
  hough_min_line_length: 30    # was 45: 급커브에서 조각난 짧은 선분도 살림
  hough_max_line_gap: 290
  hough_slope_min_abs: 0.22    # was 0.40: 커브에서 수평에 가까워진 차선이 버려지는 문제 해결(핵심)
  assumed_lane_width_ratio: 0.62
  max_center_jump: 0.70        # was 0.45: 급커브의 정상적인 중심 이동을 "튐"으로 오인해 되돌리지 않도록

detector:
  model_path: checkpoints/best.pt
  enabled: true
  # imgsz는 추론 입력 해상도. 클수록 멀리 있는 작은 신호등을 미리 감지(PC라 여유
  # 있음). 480→640으로 더 올리면 더 멀리 보지만 느려짐. GUI에서 라이브 조정 가능.
  imgsz: 640
  # GPU(RTX 4060)에서 imgsz 640 추론이 ~13ms(≈79Hz 여유) → 30Hz로 상향.
  # 아래 투표/연속 카운트는 30Hz 기준으로 스케일됨(프레임 수 = 시간 기준 유지).
  inference_hz: 30.0
  # auto = CUDA GPU on the PC when available, else CPU. Force with cpu / cuda.
  device: auto
  # class_map은 fallback 전용 — 실제 클래스 이름은 모델 메타데이터에서 읽음.
  # 2026-07-07 detect 모델: 0=light_red, 1=light_green, 2=sign_left, 3=sign_right
  class_map:
    traffic_red: 0
    traffic_green: 1
    sign_left: 2
    sign_right: 3
  # 신호등 conf를 낮추면 멀리/작게 잡히는 불도 미리 감지. 행 분할 재분류(row_*)
  # + 상태 게이팅 + 연속 투표가 오탐을 걸러주므로 낮춰도 비교적 안전.
  conf:
    traffic_green: 0.40
    traffic_red: 0.40
    sign_left: 0.65
    sign_right: 0.65
  # 30Hz 기준(10Hz 대비 ×3). green_vote_n=18 → 0.6s 창, 그중 9프레임 이상.
  green_vote_k: 9
  green_vote_n: 18
  sign_vote_k: 9
  sign_vote_n: 15
  dynamic_detect_consecutive: 6
  dynamic_clear_consecutive: 36
  # 빨간불 정지: 6프레임=0.2s 연속(구 3프레임=0.3s보다 빠르면서 표본은 2배).
  red_consecutive_after_finish: 6

throttle:
  # Moving speed band. Every throttle command (while not stopped) maps into
  # [speed_min, speed_max]. Change these two to retune overall speed.
  speed_min: 0.20
  speed_max: 0.25
  launch_cap: 0.32
  s_curve_cap: 0.24
  fork_approach_cap: 0.20
  fork_commit_cap: 0.25
  post_fork_cap: 0.30
  post_fork_min: 0.25
  dynamic_approach_cap: 0.18
  resume_cap: 0.30
  finish_cap: 0.34
  ramp_up_per_cmd: 0.03
  steer_slowdown: 0.22
  curvature_slowdown: 0.08

# Pure pursuit steering. center_error(정규화 오차)가 lateral_scale_m 미터의
# 횡방향 오프셋으로 변환되고, lookahead_m 앞의 목표점을 향한 자전거 모델 조향각
# atan2(2*wheelbase*sin(alpha), Ld) 을 max_steer_deg로 나눠 [-1,1] 명령으로 정규화.
# curve_blend 는 도로 굽어짐(signed curvature)만큼 목표점을 이동시킴.
steering:
  steer_sign: 1
  lookahead_m: 0.60
  wheelbase_m: 0.16
  lateral_scale_m: 0.30
  max_steer_deg: 30.0
  pp_gain: 1.0
  curve_blend: 1.0
  rate_limit_per_cmd: 0.10
  straight_limit: 0.45
  s_curve_limit: 0.80
  fork_approach_limit: 0.55
  fork_limit: 0.85
  post_fork_limit: 0.65
  dynamic_limit: 0.45
  resume_limit: 0.60
  finish_limit: 0.55
  lost_decay: 0.70

aruco:
  enabled: true
  dictionary: DICT_6X6_50
  target_id: 3
  detect_hz: 10.0

# YOLO 검출 프레임 전처리(CLAHE→채도부스트→밝기/대비/감마). 레퍼런스처럼
# 검출 전에 적용해 색을 또렷하게. enabled=true면 검출기·색분류가 보정본을 봄.
color_correction:
  enabled: true
  clahe_clip: 2.0
  clahe_tile: 8
  saturation_boost: 1.5
  brightness: 0
  contrast: 1.0
  saturation: 1.0
  gamma: 1.0

# YOLO가 검출한 신호등 박스의 red/green 색 판별. 박스를 세로 3등분해서
# 윗칸(red)/아랫칸(green)만 점수내고 높은 쪽이 이김. 가운데(amber)는 무시
# (미션은 red/green만, 대회 신호등은 가운데 불을 테이프로 가림).
traffic_light:
  red_h1_hi: 10
  red_h2_lo: 170
  red_s_min: 120
  red_v_min: 100
  green_h_lo: 40
  green_h_hi: 90
  green_s_min: 50
  green_v_min: 50
  # 이긴 칸의 매칭(color)/점등(lit) 픽셀 비율이 이 값 이상이어야 인정, 아니면 drop.
  row_min_ratio: 0.02
  # lit 분류기 전용: 점등 픽셀 = V>=row_lit_v_min AND 색마스크, 또는 그 밝은 색
  # 링 근처의 백열 픽셀(S<=row_white_s_max). color/lab 분류기에선 미사용.
  row_lit_v_min: 220
  row_white_s_max: 80
  # lab 분류기 전용: OpenCV 8bit LAB은 초록↔빨강 a채널 중심이 128.
  # a>=lab_a_red_min=빨강, a<=lab_a_green_max=초록, L>=lab_l_min 픽셀만 카운트.
  lab_a_red_min: 150
  lab_a_green_max: 110
  lab_l_min: 40
  # 주행 파이프라인이 쓸 분류기:
  #   color = 레퍼런스 순수 색비율(HSV, 밝기 무시). 기본값. 대회 신호등은 안 쓰는
  #           불을 검은 테이프로 가려서 색이 있는 건 켜진 램프뿐 → 꺼진 렌즈에
  #           속을 일이 없음. 엄격한 밝기 게이트가 없어 흐린/역광 램프도 덜 놓침.
  #           야외 검증됨.
  #   lit   = 발광 게이팅(HSV V>=row_lit_v_min + 백열코어). 테이프 없이 꺼진
  #           렌즈가 색을 유지할 때만 필요. V>=220 게이트가 흐린 램프를 놓칠 수 있음.
  #   lab   = LAB a채널(빨강=a큼, 초록=a작음). hue 랩어라운드 없고 조명 변화에
  #           더 안정적, HSV green 범위가 놓치는 청록 초록불도 잡음. 현장 A/B용.
  classifier: lab

mission:
  route_mode: OUT
  control_hz: 10.0
  launch_min_sec: 1.0
  fork_commit_min_sec: 0.8
  fork_commit_timeout_sec: 1.8
  dynamic_stop_hold_sec: 0.2
  resume_min_sec: 1.0
  finish_min_elapsed_sec: 8.0
  dynamic_zone_elapsed_sec: 4.0
  debug_log_hz: 1.0
